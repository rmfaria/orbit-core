# orbit-core — standalone Docker Compose stack
# Usage: cp .env.example .env && docker compose up -d
# SPDX-License-Identifier: Apache-2.0

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       orbit
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - orbit_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # ── Database migrations (one-shot) ────────────────────────────────────────────
  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/orbit
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL:  postgres://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/orbit
      ORBIT_API_KEY: ${ORBIT_API_KEY:-}
      PORT:          3000
      NODE_ENV:      production
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── UI (nginx — serves UI + proxies API) ──────────────────────────────────────
  ui:
    build:
      context: .
      target: ui
    ports:
      - "${ORBIT_PORT:-80}:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  orbit_pg:
    name: orbit_pg
