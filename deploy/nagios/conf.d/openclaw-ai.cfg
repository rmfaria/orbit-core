# ============================================================
# OpenClaw AI Gateway — Nagios Monitoring
# Cobertura: processo, estabilidade, latência, canais IA,
# upstream LLM, workspace, file descriptors, orbit-core
# ============================================================

# ── Disponibilidade — processo + porta (substitui check genérico) ─────────────
# (O service "OpenClaw Gateway" já existe em nebrasil-services.cfg via check_openclaw)

# ── Estabilidade do serviço systemd ──────────────────────────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OpenClaw_Systemd
    check_command       check_openclaw_systemd
    check_interval      2
    retry_interval      1
    notes               Estado systemd + restarts. WARN >3 restarts ou uptime<10min. Restarts = sessoes perdidas.
}

# ── Desempenho — latência de resposta do gateway ─────────────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OpenClaw_Latency
    check_command       check_openclaw_latency
    check_interval      2
    retry_interval      1
    notes               Tempo de resposta HTTP do gateway. WARN >1s CRIT >3s. Alta latencia = fila de inferencia acumulando.
}

# ── Canais de IA — saúde WhatsApp/Telegram ───────────────────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OpenClaw_Channels
    check_command       check_openclaw_channels
    check_interval      5
    retry_interval      2
    notes               Taxa de erros de canal nos ultimos 10min. WARN >3 CRIT >10. Loop de reconexao = agente sem canal.
}

# ── Upstream LLM — API Anthropic acessível ───────────────────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OpenClaw_LLM_Upstream
    check_command       check_openclaw_llm
    check_interval      5
    retry_interval      2
    notes               Alcancabilidade api.anthropic.com:443. WARN >500ms CRIT >2s. Provider down != bug local.
}

# ── Persistência — workspace + disco ─────────────────────────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OpenClaw_Workspace
    check_command       check_openclaw_workspace
    check_interval      10
    retry_interval      3
    notes               Disco livre e writability do workspace. WARN <500MB CRIT <200MB. Disco cheio = agentes perdem memoria.
}

# ── Recursos — file descriptors (detecção de leak) ───────────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OpenClaw_FileDescriptors
    check_command       check_openclaw_fd
    check_interval      5
    retry_interval      2
    notes               FDs abertos do gateway. WARN >200 CRIT >500. Crescimento anormal = leak de WebSocket iminente.
}

# ── Observabilidade — orbit-core (monitorar o monitor) ───────────────────────
define service {
    use                 generic-service
    host_name           portn8n
    service_description OrbitCore_API
    check_command       check_orbitcore_api
    check_interval      2
    retry_interval      1
    notes               Saude do orbit-core (plataforma de observabilidade). Se cair, toda visibilidade desaparece.
}

# ── Command definitions ───────────────────────────────────────────────────────

define command {
    command_name    check_openclaw_systemd
    command_line    /etc/nagios4/plugins/check_openclaw_systemd.sh
}

define command {
    command_name    check_openclaw_latency
    command_line    /etc/nagios4/plugins/check_openclaw_latency.sh
}

define command {
    command_name    check_openclaw_channels
    command_line    /etc/nagios4/plugins/check_openclaw_channels.sh
}

define command {
    command_name    check_openclaw_llm
    command_line    /etc/nagios4/plugins/check_openclaw_llm.sh
}

define command {
    command_name    check_openclaw_workspace
    command_line    /etc/nagios4/plugins/check_openclaw_workspace.sh
}

define command {
    command_name    check_openclaw_fd
    command_line    /etc/nagios4/plugins/check_openclaw_fd.sh
}

define command {
    command_name    check_orbitcore_api
    command_line    /etc/nagios4/plugins/check_orbitcore_api.sh
}
