# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/orbit.crt;
    ssl_certificate_key /etc/nginx/certs/orbit.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # API reverse proxy — strip /orbit-core prefix before forwarding
    location ^~ /orbit-core/api/ {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # OTLP + metrics proxy
    location ^~ /orbit-core/otlp/ {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /orbit-core/metrics {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # SPA static files — /orbit-core/* served from dist/
    location ^~ /orbit-core/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /orbit-core/index.html;
    }

    # Redirect /orbit-core (no trailing slash) to /orbit-core/
    location = /orbit-core {
        return 301 /orbit-core/;
    }

    # Redirect root to /orbit-core/
    location = / {
        return 301 /orbit-core/;
    }
}
