server {
    listen 80;
    server_name _;

    # API reverse proxy — strip /orbit-core prefix before forwarding
    location ^~ /orbit-core/api/ {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://api:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA static files — /orbit-core/* served from dist/
    location ^~ /orbit-core/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /orbit-core/index.html;
    }

    # Redirect root to /orbit-core/
    location = / {
        return 301 /orbit-core/;
    }
}
