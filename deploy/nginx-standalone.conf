# orbit-core standalone nginx config (Docker Compose)

# Upstream with connection reuse
upstream orbit_api {
    server api:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/certs/orbit.crt;
    ssl_certificate_key /etc/nginx/certs/orbit.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    server_tokens off;
    client_max_body_size 5m;

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── AI endpoints (longer timeout for LLM calls) ────────────────────────────
    location ^~ /orbit-core/api/v1/ai/ {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://orbit_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_buffer_size  32k;
        proxy_buffers      8 32k;
    }

    # ── API reverse proxy ─────────────────────────────────────────────────────
    location ^~ /orbit-core/api/ {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://orbit_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── OTLP proxy ────────────────────────────────────────────────────────────
    location ^~ /orbit-core/otlp/ {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://orbit_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffer_size  16k;
        proxy_buffers      8 16k;
    }

    # ── Metrics proxy ─────────────────────────────────────────────────────────
    location ^~ /orbit-core/metrics {
        rewrite ^/orbit-core/(.*)$ /$1 break;
        proxy_pass         http://orbit_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── SPA static files ─────────────────────────────────────────────────────
    location ^~ /orbit-core/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /orbit-core/index.html;

        # Immutable cache for hashed assets (js, css, fonts, images)
        location ~* \.(js|css|woff2?|svg|png|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect /orbit-core (no trailing slash) to /orbit-core/
    location = /orbit-core {
        return 301 /orbit-core/;
    }

    # Redirect root to /orbit-core/
    location = / {
        return 301 /orbit-core/;
    }
}
