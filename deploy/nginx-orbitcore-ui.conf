map_hash_bucket_size 128;

map $cookie_orbit_session $orbit_authed {
    "3a73f0f69c5cfb22e19b1bd3fcf54528243c6073768f93a6fdfe356eddefbdeb" 1;
    default 0;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Login page — always accessible (self-contained, no external deps)
  location = /login.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
  }

  # Logout — clear session cookie and redirect to login
  location = /logout {
    add_header Set-Cookie "orbit_session=; Path=/orbit-core; Max-Age=0; SameSite=Strict; Secure" always;
    return 302 /orbit-core/login.html;
  }

  # Favicons and logos — accessible without auth (for login page tab icon)
  location ~* ^/(favicon|apple-touch|orbitcore-logo).*$ {
    try_files $uri =404;
  }

  # Hashed JS/CSS bundles — require auth, long cache
  location ~* \.(?:js|css)$ {
    if ($orbit_authed = 0) {
      return 302 /orbit-core/login.html;
    }
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html — require auth, no cache
  location = /index.html {
    if ($orbit_authed = 0) {
      return 302 /orbit-core/login.html;
    }
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
    try_files $uri =404;
  }

  # SPA fallback — require auth
  location / {
    if ($orbit_authed = 0) {
      return 302 /orbit-core/login.html;
    }
    try_files $uri $uri/ /index.html;
  }
}
