server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed assets (JS/CSS bundles with content hash in filename) — cache 1 year
  location ~* \.(?:js|css)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # index.html — never cache; browser always revalidates so new bundle hashes are picked up
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
    try_files $uri =404;
  }

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }
}
