# orbit-core UI — nginx config for Docker Swarm
# Auth is handled by the SPA (AuthGate component) via /api/v1/auth/*

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Hashed JS/CSS bundles — immutable cache (filename includes hash)
  location ~* \.(?:js|css|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Images and icons — long cache
  location ~* \.(?:png|svg|ico|webp)$ {
    add_header Cache-Control "public, max-age=86400";
    try_files $uri =404;
  }

  # index.html — no cache (SPA entry point)
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
  }

  # SPA fallback — all routes serve index.html
  location / {
    try_files $uri $uri/ /index.html;
  }
}
