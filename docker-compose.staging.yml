# orbit-core — Staging / Stress-test environment
# Usage: docker compose -f docker-compose.staging.yml up -d
#
# This is the ONLY environment where stress tests and benchmarks should run.
# NEVER run stress tests against prod.nesecurity.com.br.
#
# SPDX-License-Identifier: Apache-2.0

services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       orbit
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-staging}
    volumes:
      - staging_pg:/var/lib/postgresql/data
    shm_size: '256m'
    deploy:
      resources:
        limits:
          memory: 2G
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d orbit"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  migrate:
    build:
      context: .
      target: migrate
    environment:
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD:-staging}@postgres:5432/orbit
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  api:
    build:
      context: .
      target: api
    environment:
      DATABASE_URL:  postgres://postgres:${POSTGRES_PASSWORD:-staging}@postgres:5432/orbit
      ORBIT_API_KEY: ${ORBIT_API_KEY:-staging-key}
      PORT:          3000
      NODE_ENV:      production
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "3010:3000"
    deploy:
      resources:
        limits:
          memory: 1G
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  staging_pg:
    name: orbit_staging_pg
